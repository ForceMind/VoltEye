<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoltEye 电费监控</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>公寓电费监控</h1>
        <p class="subtitle">单图表展示近 30 天电费消耗（元）</p>
      </header>

      <section class="stats">
        <div class="stat">
          <span>当前余额</span>
          <strong id="latest-balance">--</strong>
        </div>
        <div class="stat">
          <span>今日消耗</span>
          <strong id="today-usage">--</strong>
        </div>
        <div class="stat">
          <span>最后同步</span>
          <strong id="last-sync">--</strong>
        </div>
      </section>

      <section class="chart-panel">
        <div id="usage-chart"></div>
      </section>

      <section class="footer">
        <span id="status-text">加载中...</span>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
