<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoltEye 电费监控</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>公寓电费监控</h1>
        <p class="subtitle">柱状图：区间消耗，折线图：余额走势</p>
      </header>

      <section class="stats">
        <div class="stat">
          <span>当前余额</span>
          <strong id="latest-balance">--</strong>
        </div>
        <div class="stat">
          <span>今日消耗</span>
          <strong id="today-usage">--</strong>
        </div>
        <div class="stat">
          <span>最后同步</span>
          <strong id="last-sync">--</strong>
        </div>
      </section>

      <section class="controls">
        <label class="control">
          <span>预设区间</span>
          <select id="range-hours">
            <option value="6">近 6 小时</option>
            <option value="12">近 12 小时</option>
            <option value="24">近 24 小时</option>
            <option value="48">近 2 天</option>
            <option value="72" selected>近 3 天</option>
            <option value="168">近 7 天</option>
            <option value="336">近 14 天</option>
            <option value="720">近 30 天</option>
          </select>
        </label>

        <label class="control wide">
          <span>开始时间（可选）</span>
          <input id="start-time" type="datetime-local" />
        </label>

        <label class="control wide">
          <span>结束时间（可选）</span>
          <input id="end-time" type="datetime-local" />
        </label>

        <label class="control">
          <span>显示间隔（分钟）</span>
          <input id="interval-minutes" type="number" min="30" step="30" value="30" />
        </label>

        <button id="apply-btn" type="button">应用设置</button>
        <button id="clear-time-btn" type="button" class="ghost">清空自定义时间</button>
        <a id="export-chart-link" class="btn-link" href="/api/export-chart.csv">导出当前图表</a>
        <a id="export-raw-link" class="btn-link secondary" href="/api/export.csv">导出原始数据</a>
      </section>

      <section class="chart-meta">
        <span id="range-text">当前：近 3 天</span>
        <span id="interval-text">间隔：30 分钟</span>
        <span id="bucket-text">点数：--</span>
      </section>

      <section class="chart-panel">
        <div id="usage-chart"></div>
      </section>

      <section class="footer">
        <span id="status-text">加载中...</span>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
